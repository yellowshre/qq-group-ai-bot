spring:
  datasource:
    url: ${QQBOT_MYSQL_URL:jdbc:mysql://127.0.0.1:3306/qqbot?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true}
    username: ${QQBOT_MYSQL_USERNAME:qqbot}
    password: ${QQBOT_MYSQL_PASSWORD:qqbot_dev_pwd}
    hikari:
      maximum-pool-size: 5
      connection-timeout: 3000
      initialization-fail-timeout: -1
  sql:
    init:
      mode: never

simbot:
  bots:
    auto-start-bots: false
    configuration-json-resources: []

qqbot:
  onebot:
    access-token: ""
    dry-run: true
    self-id: ${QQBOT_ONEBOT_SELF_ID:}
    allowed-group-ids: ${QQBOT_ONEBOT_ALLOWED_GROUP_IDS:}
    ws:
      enabled: ${QQBOT_ONEBOT_WS_ENABLED:false}
      url: ${QQBOT_ONEBOT_WS_URL:ws://127.0.0.1:3001/}
      access-token: ${QQBOT_ONEBOT_WS_TOKEN:}
      reconnect-delay-ms: ${QQBOT_ONEBOT_WS_RECONNECT_DELAY_MS:5000}

  redis:
    host: ${QQBOT_REDIS_HOST:127.0.0.1}
    port: ${QQBOT_REDIS_PORT:6379}
    password: ${QQBOT_REDIS_PASSWORD:}

  default-persona: ${QQBOT_DEFAULT_PERSONA:你是一个说话简短、自然、略带吐槽但不恶意攻击人的 QQ 群机器人。}

  identity:
    display-name: ${QQBOT_DISPLAY_NAME:小黄}
    aliases:
      - ${QQBOT_ALIAS_PRIMARY:小黄}
      - ${QQBOT_ALIAS_SECONDARY:黄哥}
      - ${QQBOT_ALIAS_FALLBACK:机器人}
    default-persona: ${QQBOT_DEFAULT_PERSONA:你是一个说话简短、自然、略带吐槽但不恶意攻击人的 QQ 群机器人。}

  safety:
    admin-only: true
    active-chat-off-words:
      - "#autochatoff"
      - "#停用主动插话"
      - "#别插话"
      - "小黄闭嘴"
    active-chat-on-words:
      - "#autochaton"
      - "#开启主动插话"
      - "#可以说话了"
      - "小黄说话"

#  passive-chat:
#    trigger-words:
#      - "小黄"
#      - "黄哥"
#      - "机器人"
  passive-chat:
    trigger-words: ${QQBOT_PASSIVE_CHAT_TRIGGER_WORDS:小黄,黄哥,机器人}

  active-chat:
    enabled: true
    cooldown-seconds: 180
    max-per-hour: 20
    random-probability: 1.0
    min-confidence: 0.6
    min-message-length: 3
    max-message-length: 80
    allow-after-meme-sent: false
    allow-after-bot-message: false

  chat-context:
    key-prefix: "qqbot:chat:ctx:"
    max-size: 10
    ttl-minutes: 120
    max-message-length: 160

  meme:
    cache-preheat-enabled: true
    base-dir: ${QQBOT_MEME_BASE_DIR:./memes}

  dify:
    enabled: ${DIFY_ENABLED:false}
    base-url: ${DIFY_BASE_URL:https://api.dify.ai/v1}
    workflow:
      meme-scene: ${DIFY_MEME_SCENE_WORKFLOW:meme-scene-recognizer}
      passive-chat: ${DIFY_PASSIVE_CHAT_WORKFLOW:passive-chat-reply}
      active-chat: ${DIFY_ACTIVE_CHAT_WORKFLOW:active-chat-reply}
    meme-scene-api-key: ${DIFY_MEME_SCENE_API_KEY:}
    passive-chat-api-key: ${DIFY_PASSIVE_CHAT_API_KEY:}
    active-chat-api-key: ${DIFY_ACTIVE_CHAT_API_KEY:}
    timeout-ms: 30000
    passive-chat-min-confidence: 0.5
