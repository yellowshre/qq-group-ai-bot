spring:
  application:
    name: qqbot
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: ${QQBOT_MYSQL_URL:jdbc:mysql://localhost:3306/qqbot?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true}
    username: ${QQBOT_MYSQL_USERNAME:qqbot}
    password: ${QQBOT_MYSQL_PASSWORD:qqbot_dev_pwd}
    hikari:
      initialization-fail-timeout: -1
  sql:
    init:
      mode: never
server:
  port: 8081

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  global-config:
    banner: false
    db-config:
      id-type: auto
  configuration:
    map-underscore-to-camel-case: true

qqbot:
  bot-id: ${QQBOT_BOT_ID:}
  nicknames:
    - ${QQBOT_NICKNAME:机器人}
  admins: ${QQBOT_ADMINS:}
  default-persona: ${QQBOT_DEFAULT_PERSONA:你是一个说话简短、自然、略带吐槽但不恶意攻击人的 QQ 群机器人。}
  default-safe-reply: ${QQBOT_DEFAULT_SAFE_REPLY:收到，我先安静一下。}
  identity:
    display-name: ${QQBOT_DISPLAY_NAME:小黄}
    aliases:
      - ${QQBOT_ALIAS_PRIMARY:小黄}
      - ${QQBOT_ALIAS_SECONDARY:黄哥}
      - ${QQBOT_ALIAS_FALLBACK:机器人}
    default-persona: ${QQBOT_DEFAULT_PERSONA:你是一个说话简短、自然、略带吐槽但不恶意攻击人的 QQ 群机器人。}
  safety:
    admin-only: ${QQBOT_SAFETY_ADMIN_ONLY:true}
    active-chat-off-words:
      - "#autochatoff"
      - "#停用主动插话"
      - "#别插话"
      - "小黄闭嘴"
    active-chat-on-words:
      - "#autochaton"
      - "#开启主动插话"
      - "#可以说话了"
      - "小黄说话"
#  passive-chat:
#    trigger-words:
#      - "小黄"
#      - "黄哥"
#      - "机器人"
  passive-chat:
    trigger-words: ${QQBOT_PASSIVE_CHAT_TRIGGER_WORDS:小黄,黄哥,机器人}

  active-chat:
    enabled: ${QQBOT_ACTIVE_CHAT_ENABLED:true}
    cooldown-seconds: ${QQBOT_ACTIVE_CHAT_COOLDOWN_SECONDS:180}
    max-per-hour: ${QQBOT_ACTIVE_CHAT_MAX_PER_HOUR:20}
    random-probability: ${QQBOT_ACTIVE_CHAT_RANDOM_PROBABILITY:1.0}
    min-confidence: ${QQBOT_ACTIVE_CHAT_MIN_CONFIDENCE:0.6}
    min-message-length: ${QQBOT_ACTIVE_CHAT_MIN_MESSAGE_LENGTH:3}
    max-message-length: ${QQBOT_ACTIVE_CHAT_MAX_MESSAGE_LENGTH:80}
    allow-after-meme-sent: ${QQBOT_ACTIVE_CHAT_ALLOW_AFTER_MEME_SENT:false}
    allow-after-bot-message: ${QQBOT_ACTIVE_CHAT_ALLOW_AFTER_BOT_MESSAGE:false}
  onebot:
    api-server-host: ${QQBOT_ONEBOT_API:http://127.0.0.1:3000}
    event-server-host: ${QQBOT_ONEBOT_EVENT:ws://127.0.0.1:3001}
    access-token: ${QQBOT_ONEBOT_TOKEN:}
    self-id: ${QQBOT_ONEBOT_SELF_ID:}
    allowed-group-ids: ${QQBOT_ONEBOT_ALLOWED_GROUP_IDS:}
    dry-run: ${QQBOT_ONEBOT_DRY_RUN:true}
    ws:
      enabled: ${QQBOT_ONEBOT_WS_ENABLED:false}
      url: ${QQBOT_ONEBOT_WS_URL:ws://127.0.0.1:3001/}
      access-token: ${QQBOT_ONEBOT_WS_TOKEN:}
      reconnect-delay-ms: ${QQBOT_ONEBOT_WS_RECONNECT_DELAY_MS:5000}
  redis:
    host: ${QQBOT_REDIS_HOST:127.0.0.1}
    port: ${QQBOT_REDIS_PORT:6379}
    password: ${QQBOT_REDIS_PASSWORD:}
    timeout: ${QQBOT_REDIS_TIMEOUT:3s}
    database:
      base: 0
      chat: 1
      meme: 2
      rate: 3
  rate-limit:
    emoji-per-minute: ${QQBOT_RATE_EMOJI_PER_MINUTE:6}
    passive-chat-per-minute: ${QQBOT_RATE_PASSIVE_CHAT_PER_MINUTE:3}
    active-chat-per-minute: ${QQBOT_RATE_ACTIVE_CHAT_PER_MINUTE:1}
  memory:
    short-turns: ${QQBOT_MEMORY_SHORT_TURNS:10}
    long-turns: ${QQBOT_MEMORY_LONG_TURNS:20}
    ttl: ${QQBOT_MEMORY_TTL:30m}
  chat-context:
    key-prefix: ${QQBOT_CHAT_CONTEXT_KEY_PREFIX:qqbot:chat:ctx:}
    max-size: ${QQBOT_CHAT_CONTEXT_MAX_SIZE:10}
    ttl-minutes: ${QQBOT_CHAT_CONTEXT_TTL_MINUTES:120}
    max-message-length: ${QQBOT_CHAT_CONTEXT_MAX_MESSAGE_LENGTH:160}
  meme:
    cache-preheat-enabled: ${QQBOT_MEME_CACHE_PREHEAT_ENABLED:true}
    base-dir: ${QQBOT_MEME_BASE_DIR:./memes}
  dify:
    enabled: ${DIFY_ENABLED:false}
    base-url: ${DIFY_BASE_URL:http://127.0.0.1:5001}
    workflow:
      meme-scene: ${DIFY_MEME_SCENE_WORKFLOW:meme-scene-recognizer}
      passive-chat: ${DIFY_PASSIVE_CHAT_WORKFLOW:passive-chat-reply}
      active-chat: ${DIFY_ACTIVE_CHAT_WORKFLOW:active-chat-reply}
    meme-scene-api-key: ${DIFY_MEME_SCENE_API_KEY:}
    passive-chat-api-key: ${DIFY_PASSIVE_CHAT_API_KEY:}
    active-chat-api-key: ${DIFY_ACTIVE_CHAT_API_KEY:}
    timeout-ms: ${DIFY_TIMEOUT_MS:30000}
    passive-chat-min-confidence: ${DIFY_PASSIVE_CHAT_MIN_CONFIDENCE:0.5}
  async:
    core-pool-size: ${QQBOT_ASYNC_CORE_POOL_SIZE:4}
    max-pool-size: ${QQBOT_ASYNC_MAX_POOL_SIZE:12}
    queue-capacity: ${QQBOT_ASYNC_QUEUE_CAPACITY:500}
